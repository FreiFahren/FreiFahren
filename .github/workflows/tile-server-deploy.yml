name: tile-server Deploy

on:
    push:
        branches: [main]
        paths:
            - 'packages/tile-server/**'
            - '.github/workflows/tile-server-deploy.yml'
    workflow_dispatch: {}

# Newest commit wins; never run two deploys at once.
concurrency:
    group: deploy-tile-server
    cancel-in-progress: true

jobs:
    deploy:
        # Gated on the public base URL being configured. Set the `TILES_BASE_URL` repo variable
        # (e.g. https://basemap.freifahren.org) only after the R2 bucket's custom domain + the
        # "Respect Strong ETags" cache rule are in place. Until then this job is skipped, so merging
        # this workflow never runs against an unconfigured edge and never affects existing users.
        if: ${{ vars.TILES_BASE_URL != '' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        defaults:
            run:
                working-directory: packages/tile-server
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # Downloads each city's OSM extract, runs tilemaker, and writes dist/<city>.pmtiles +
            # dist/styles/<city>.json — the same script local dev uses. The commit sha is the single
            # version lever: it goes into both the style's archive URL (here) and the upload key
            # (below), so they can never diverge.
            - name: Generate tiles + styles
              env:
                  TILES_BASE_URL: ${{ vars.TILES_BASE_URL }}
              run: TILES_VERSION="${GITHUB_SHA::8}" bun run generate

            - name: Upload to R2
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  set -euo pipefail
                  SHA="${GITHUB_SHA::8}"
                  for city in $(jq -r '.cities[].name' cities.json); do
                      # Immutable, versioned archive — long cache, never purged (the /v<sha>/ path is
                      # the cache-bust).
                      bunx wrangler@latest r2 object put "freifahren-tiles/v$SHA/$city.pmtiles" \
                          --file "dist/$city.pmtiles" \
                          --content-type application/octet-stream \
                          --cache-control "public, max-age=31536000, immutable" \
                          --remote
                      # The style is the only mutable pointer — short TTL so a redeploy propagates
                      # quickly. It already references this build's immutable /v<sha>/ archive.
                      bunx wrangler@latest r2 object put "freifahren-tiles/styles/$city.json" \
                          --file "dist/styles/$city.json" \
                          --content-type application/json \
                          --cache-control "public, max-age=60, must-revalidate" \
                          --remote
                  done
