name: API Worker Deploy

on:
    push:
        branches: [main]
        paths:
            - 'packages/api-worker/**'
            - '.github/workflows/api-worker-deploy.yml'

concurrency:
    group: api-worker-deploy
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        defaults:
            run:
                working-directory: packages/api-worker
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # Apply any new D1 migrations before deploying the worker that depends on them.
            # Reference-data reseeds are a separate, deliberate job (see DEPLOY.md) — not run on
            # every deploy, because the report-preserving seed runs against libsql, not D1.
            - name: Apply D1 migrations
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: bunx wrangler d1 migrations apply DB --remote

            - name: Deploy worker
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: packages/api-worker
                  secrets: |
                      REPORT_PASSWORD
              env:
                  REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}

            - name: Purge transit edge cache
              env:
                  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              run: bun run db:purge-cache
