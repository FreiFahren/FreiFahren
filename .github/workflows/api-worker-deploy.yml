name: API Worker Deploy

on:
    push:
        branches: [main]
        paths:
            - 'packages/api-worker/**'
            # Bundled at runtime, so a registry-only change must redeploy this worker.
            - 'packages/cities/**'
            - '.github/workflows/api-worker-deploy.yml'

concurrency:
    group: api-worker-deploy
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        # Records a GitHub deployment for this worker so it shows in the repo's Deployments tab.
        environment:
            name: api-worker
            url: https://api.freifahren.org
        permissions:
            contents: read
        defaults:
            run:
                working-directory: packages/api-worker
        steps:
            - name: Check out code
              uses: actions/checkout@v4
              with:
                  # Full history so `sentry-cli releases set-commits --auto` can resolve the
                  # commit range between the previous release and this deploy.
                  fetch-depth: 0

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # Apply any new D1 migrations before deploying the worker that depends on them.
            # The seed job (which runs after this) reapplies them idempotently per city.
            - name: Apply D1 migrations
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: bunx wrangler d1 migrations apply DB --remote

            - name: Deploy worker
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: packages/api-worker
                  # The commit SHA becomes the Sentry release the worker reports at runtime.
                  command: deploy --var SENTRY_RELEASE:${{ github.sha }}
                  secrets: |
                      REPORT_PASSWORD
              env:
                  REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}

            # Register the release in Sentry (named after the commit SHA the worker reports) so
            # issues can be resolved "in the next release". Commit association is best-effort:
            # the release is still created/finalized if set-commits can't resolve the range.
            - name: Create Sentry release
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: freifahren-web
                  SENTRY_PROJECT: api-worker
                  SENTRY_URL: https://de.sentry.io
              run: |
                  bunx @sentry/cli releases new "$GITHUB_SHA"
                  bunx @sentry/cli releases set-commits "$GITHUB_SHA" --auto --ignore-missing || echo "set-commits skipped"
                  bunx @sentry/cli releases finalize "$GITHUB_SHA"
                  bunx @sentry/cli releases deploys "$GITHUB_SHA" new --env production

    # List every city in the @freifahren/cities registry so the seed job can fan out over
    # them. This keeps reseeding automatic: a change to the seeding logic (e.g. how stations
    # are merged) propagates to every city's live reference data without a manual trigger.
    plan:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            cities: ${{ steps.cities.outputs.list }}
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            # The registry is dependency-free plain TS, so it imports without `bun install`.
            - name: Resolve city matrix
              id: cities
              run: |
                  list=$(bun -e 'import { CITY_SLUGS } from "./packages/cities/src/index.ts"; console.log(JSON.stringify(CITY_SLUGS))')
                  echo "list=$list" >> "$GITHUB_OUTPUT"

    # Reseed each city's remote D1 with the bundled reference data, then purge its cache.
    # Builds the data via the report-preserving seed and loads it with INSERT OR IGNORE —
    # additive and idempotent, so reports stay intact and re-running is a no-op if unchanged.
    # Runs after deploy so the two don't apply migrations concurrently. Each matrix leg
    # touches only that city's isolated DB. Preconditions: the city's D1 binding exists.
    seed:
        needs: [plan, deploy]
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            # One city at a time: keeps D1 writes and cache purges from interleaving.
            max-parallel: 1
            matrix:
                city: ${{ fromJSON(needs.plan.outputs.cities) }}
        defaults:
            run:
                working-directory: packages/api-worker
        env:
            # Passed via env (not interpolated into the run script) to avoid shell injection.
            SEED_CITY_INPUT: ${{ matrix.city }}
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # seed-d1.ts resolves the city's D1 binding from the registry, applies migrations,
            # and loads the reference data into the remote DB.
            - name: Seed remote D1
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: bun run seed --city "$SEED_CITY_INPUT" --remote

            # Purge only this city's transit Cache-Tag, so reseeding one city leaves the others' caches intact.
            - name: Purge transit edge cache
              env:
                  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              run: bun run db:purge-cache --city "$SEED_CITY_INPUT"
