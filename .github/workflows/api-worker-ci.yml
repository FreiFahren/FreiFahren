name: API Worker CI

on:
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: cd packages/api-worker && bun install

            - name: Run ESLint
              run: cd packages/api-worker && bun run lint

            - name: Run Prettier check
              run: cd packages/api-worker && bun run format:check

    test:
        runs-on: ubuntu-latest
        needs: lint
        permissions:
            contents: read
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: cd packages/api-worker && bun install

            # Tests run on the Workers runtime via Vitest (@cloudflare/vitest-pool-workers):
            # tests/setup.ts applies the D1 migrations and seeds the reference tables into the
            # test D1 binding. Env vars are provided by vitest.config.ts, so none are needed here.
            - name: Run api worker tests
              run: cd packages/api-worker && bun run test
