name: API Worker CI

on:
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: cd packages/api-worker && bun install

            - name: Run ESLint
              run: cd packages/api-worker && bun run lint

            - name: Run Prettier check
              run: cd packages/api-worker && bun run format:check

    test:
        runs-on: ubuntu-latest
        needs: lint
        permissions:
            contents: read
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: cd packages/api-worker && bun install

            # Tests run against a local libsql SQLite file: tests/preload.ts creates the file,
            # applies migrations and seeds the reference data. No external database required.
            - name: Run api worker tests
              run: cd packages/api-worker && bun test
