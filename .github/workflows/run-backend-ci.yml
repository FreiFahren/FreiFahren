name: Backend CI

on:
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: cd packages/hono-backend && bun install

            - name: Run ESLint
              run: cd packages/hono-backend && bun run lint

            - name: Run Prettier check
              run: cd packages/hono-backend && bun run format:check

    test:
        runs-on: ubuntu-latest
        needs: lint
        permissions:
            contents: read
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: astral-sh/setup-uv@v3

            - name: Start services
              run: |
                  cd packages/hono-backend
                  docker compose -f compose-hono.test.yaml up -d

            - name: Wait for Postgres
              run: |
                  for i in {1..30}; do
                    if docker exec hono-postgres pg_isready -U postgres > /dev/null 2>&1; then
                      echo "Postgres is ready"
                      exit 0
                    fi
                    echo "Waiting for Postgres..."
                    sleep 3
                  done
                  echo "Postgres did not become ready in time"
                  exit 1

            - name: Run migrations
              run: |
                  cd packages/hono-backend
                  docker compose -f compose-hono.test.yaml exec bun bun run db:migrate

            - name: Seed base data
              run: |
                  cd packages/hono-backend
                  docker compose -f compose-hono.test.yaml exec bun bun run db:seed

            - name: Run hono backend tests
              run: |
                  cd packages/hono-backend
                  docker compose -f compose-hono.test.yaml exec bun bun test

            - name: Install telegram bot dev deps
              run: |
                  cd packages/telegram_bot
                  uv sync --group dev

            - name: Run telegram bot integration tests
              env:
                  BACKEND_URL: http://localhost:3000
                  REPORT_PASSWORD: password
                  MISTRAL_API_KEY: unused-stubbed
                  TELEGRAM_BOT_TOKEN: '1:fake'
                  TELEGRAM_REPORT_CHAT_ID: '-1001'
              run: |
                  cd packages/telegram_bot
                  uv run pytest -v

            - name: Stop containers
              if: always()
              run: |
                  cd packages/hono-backend
                  docker compose -f compose-hono.test.yaml down
