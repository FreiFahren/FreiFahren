name: warehouse-export Deploy

on:
    push:
        branches: [main]
        paths:
            - 'packages/warehouse-export/**'
            - '.github/workflows/warehouse-export-deploy.yml'
    workflow_dispatch: {}

# Newest commit wins; never run two deploys at once.
concurrency:
    group: deploy-warehouse-export
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        # Records a GitHub deployment for this worker so it shows in the repo's Deployments tab.
        # No url: warehouse-export has no public HTTP endpoint (it's a scheduled export worker).
        environment:
            name: warehouse-export
        permissions:
            contents: read
        defaults:
            run:
                working-directory: packages/warehouse-export

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # Safety gate: type errors fail the job before anything deploys.
            - name: Typecheck
              run: bun run typecheck

            - name: Deploy to Cloudflare Workers
              run: bunx wrangler@latest deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
