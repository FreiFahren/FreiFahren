<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon-32x32.png" />
    <!-- Open the TCP+TLS connections to the map-tile and API hosts during HTML parse, so the
         handshakes are already done when maplibre requests tiles and the route loaders fetch
         data (otherwise those connections open ~3-4s in, on the critical path to LCP).
         crossorigin is required: both origins are reached via CORS fetch (vector tiles / JSON). -->
    <link rel="preconnect" href="https://tiles.freifahren.org" crossorigin />
    <link rel="preconnect" href="https://api.freifahren.org" crossorigin />
    <!-- Paints the iOS status-bar / dynamic-island area with the card color (matches the
         report form and the map search bar). Keep in sync with --card in src/index.css. -->
    <meta name="theme-color" content="#25272b" />
    <!-- Lock page scale: the map owns pinch-zoom, so the page itself must never zoom.
         This also stops iOS Safari auto-zooming when the (position:fixed) search input is focused. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.freifahren.org/" />
    <meta property="og:title" content="Freifahren - Echtzeit Kontrollen" />
    <meta
      property="og:description"
      content="Sieh Ticketkontrollen auf der Karte und melde neue Kontrollen in Echtzeit."
    />
    <meta property="og:image" content="https://app.freifahren.org/logo-with-text.png" />
    <meta
      name="description"
      content="Freifahren ist eine Webapp, die es Nutzern ermöglicht Ticketkontrollen zu melden und sich vor Kontrollen zu warnen."
    />
    <title>FreiFahren</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
