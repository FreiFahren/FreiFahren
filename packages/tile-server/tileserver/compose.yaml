services:
  tileserver:
    image: maptiler/tileserver-gl:latest
    command: ["--config", "/data/config.json", "--port", "8080"]
    ports:
      - "8090:8080"
    volumes:
      - ./config.json:/data/config.json:ro
      - ./data:/data/data:ro
      - ./styles:/data/styles:ro
      - ./fonts:/data/fonts:ro
      - ./sprites:/data/sprites:ro
    restart: unless-stopped
